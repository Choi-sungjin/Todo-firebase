<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>할일</title>
  <link rel="icon" type="image/png" href="./favicon.png?v=2" sizes="981x911" />
  <link rel="shortcut icon" type="image/png" href="./favicon.png?v=2" sizes="981x911" />
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/motion.css" />
  <script>
    (function () {
      var t = localStorage.getItem("theme");
      if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches))
        document.documentElement.setAttribute("data-theme", "dark");
      else
        document.documentElement.setAttribute("data-theme", "light");
    })();
  </script>
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-top">
      <button class="theme-toggle" id="theme-toggle" type="button" title="다크/라이트 모드 전환" aria-label="테마 전환"></button>
      <div class="header-title-wrap">
        <p class="header-date" id="header-date"></p>
        <h1 class="header-title">나의 할일</h1>
      </div>
      <button class="add-fab" id="open-modal">＋</button>
    </div>

    <!-- 탭: 오늘 / 내일 / 전체일정 / 지난일정 -->
    <div class="tab-group">
      <button class="tab active" data-tab="today">오늘</button>
      <button class="tab" data-tab="tomorrow">내일</button>
      <button class="tab" data-tab="all">전체일정</button>
      <button class="tab" data-tab="past">지난일정</button>
    </div>
  </header>

  <!-- 할일 목록 -->
  <main class="todo-list" id="todo-list">
    <div class="date-filter-bar hidden" id="date-filter-bar">
      <span class="date-filter-text" id="date-filter-text"></span>
      <button type="button" class="date-filter-clear" id="date-filter-clear">전체 보기</button>
    </div>
    <div class="empty-state" id="empty-state">
      <p>🎉</p>
      <p>할일이 없어요!</p>
    </div>
    <div id="todo-list-cards"></div>
  </main>

  <!-- ───── 스케줄 차트 섹션 ───── -->
  <section class="schedule-section" id="nav-schedule">
    <div class="schedule-header">
      <h2 class="schedule-title">📅 전체 일정</h2>
      <div class="month-nav">
        <button id="prev-month">‹</button>
        <span id="current-month-label"></span>
        <button id="next-month">›</button>
      </div>
    </div>
    <div class="schedule-chart" id="schedule-chart"></div>
  </section>

  <!-- 할일 추가 모달 -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <h2 class="modal-title" id="modal-title">새 할일</h2>
      <div class="form-group">
        <label>할일</label>
        <div class="input-wrapper">
          <input type="text" id="todo-input" placeholder="무엇을 해야 하나요?" autocomplete="off" />
          <ul class="autocomplete-list hidden" id="autocomplete-list"></ul>
        </div>
      </div>
      <div class="template-suggestion hidden" id="template-suggestion">
        <span>💡</span>
        <span id="template-name"></span>
        <button id="apply-template">적용</button>
      </div>
      <div class="form-row">
        <div class="form-group half">
          <label>카테고리</label>
          <select id="category-select">
            <option value="">없음</option>
            <option value="업무">💼 업무</option>
            <option value="건강">🏃 건강</option>
            <option value="학습">📚 학습</option>
            <option value="생활">🏠 생활</option>
          </select>
        </div>
        <div class="form-group half">
          <label>우선순위</label>
          <select id="priority-select">
            <option value="medium">보통</option>
            <option value="high">높음 🔴</option>
            <option value="low">낮음 🟢</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group half">
          <label>시작일</label>
          <input type="date" id="start-date-input" />
        </div>
        <div class="form-group half">
          <label>마감일</label>
          <input type="date" id="deadline-input" />
        </div>
      </div>
      <div class="form-row form-row-all-day">
        <div class="form-group all-day-group">
          <label class="all-day-label">
            <input type="checkbox" id="all-day-checkbox" checked />
            <span>종일</span>
          </label>
        </div>
        <div class="form-row time-inputs-row" id="time-inputs-row">
          <div class="form-group half">
            <label>시작 시간</label>
            <input type="time" id="start-time-input" value="00:00" disabled />
          </div>
          <div class="form-group half">
            <label>종료 시간</label>
            <input type="time" id="end-time-input" value="18:00" disabled />
          </div>
        </div>
      </div>
      <div class="subtask-suggestion hidden" id="subtask-suggestion">
        <label>📌 추천 세부 작업</label>
        <div class="subtask-chips" id="subtask-chips"></div>
      </div>
      <div class="form-group">
        <label>메모</label>
        <textarea id="memo-input" placeholder="추가 메모를 입력하세요" rows="2"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="close-modal">취소</button>
        <button class="btn-add" id="add-btn">추가하기</button>
      </div>
    </div>
  </div>

  <!-- 날짜 클릭 시: 할일 있는 날 선택 팝업 (기존 할일보기 / 할일 등록하기) -->
  <div class="date-choice-overlay hidden" id="date-choice-overlay">
    <div class="date-choice-popup">
      <p class="date-choice-title" id="date-choice-title"></p>
      <div class="date-choice-buttons">
        <button type="button" class="date-choice-btn date-choice-btn-view" id="date-choice-view">일정보기</button>
        <button type="button" class="date-choice-btn date-choice-btn-add" id="date-choice-add">할일 등록하기</button>
      </div>
      <button type="button" class="date-choice-close" id="date-choice-close" aria-label="닫기">✕</button>
    </div>
  </div>

  <!-- 원형 시계 타임 피커 -->
  <div class="time-picker-overlay hidden" id="time-picker-overlay">
    <div class="time-picker-popup">
      <p class="time-picker-title" id="time-picker-title">시간 선택</p>
      <div class="time-picker-mode-row">
        <button type="button" class="time-picker-mode-btn active" id="time-picker-mode-hour">시 선택</button>
        <button type="button" class="time-picker-mode-btn" id="time-picker-mode-minute">분 선택</button>
      </div>
      <div class="clock-wrap">
        <div class="clock-face" id="clock-face">
          <div class="clock-hand clock-hand-hour" id="clock-hand-hour"></div>
          <div class="clock-hand clock-hand-minute" id="clock-hand-minute"></div>
        </div>
      </div>
      <div class="time-picker-ampm-row">
        <button type="button" class="time-picker-ampm-btn" id="time-picker-am">오전</button>
        <button type="button" class="time-picker-ampm-btn" id="time-picker-pm">오후</button>
        <button type="button" class="time-picker-ampm-btn" id="time-picker-all-day">종일</button>
      </div>
      <input type="text" class="time-picker-display" id="time-picker-display" value="00:00" placeholder="오전 12:00" />
      <div class="time-picker-actions">
        <button type="button" class="btn-cancel time-picker-cancel" id="time-picker-cancel">취소</button>
        <button type="button" class="date-choice-btn date-choice-btn-add" id="time-picker-apply">적용</button>
      </div>
    </div>
  </div>

  <!-- Firebase Realtime Database -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      push,
      onValue,
      remove,
      update,
      goOnline
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDe6wQl7i3kwD0jPMPUP97KGfQuiPh5u8I",
      authDomain: "aif-todo-backend.firebaseapp.com",
      databaseURL: "https://aif-todo-backend-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "aif-todo-backend",
      storageBucket: "aif-todo-backend.firebasestorage.app",
      messagingSenderId: "968012722020",
      appId: "1:968012722020:web:316e9d0cb3bcbe4d35d471",
      measurementId: "G-S85KYGSHDK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    goOnline(db);

    window._db = db;
    window._ref = ref;
    window._set = set;
    window._push = push;
    window._onValue = onValue;
    window._remove = remove;
    window._update = update;

    const script = document.createElement("script");
    script.src = "js/suggest.js";
    document.body.appendChild(script);
  </script>

</body>
</html>
